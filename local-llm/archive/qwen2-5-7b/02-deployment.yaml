apiVersion: apps/v1
kind: Deployment
metadata:
    name: qwen2-5-7b
    namespace: homelab-ai
spec:
    replicas: 1
    selector:
        matchLabels:
            app: qwen2-5-7b
    template:
        metadata:
            labels:
                app: qwen2-5-7b
        spec:
            nodeSelector:
                kubernetes.io/hostname: homelab-worker-01
            runtimeClassName: nvidia
            initContainers:
                - name: download-model
                  image: curlimages/curl:latest
                  command:
                      - sh
                      - -c
                      - |
                          SHARD1=/models/qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf
                          SHARD2=/models/qwen2.5-7b-instruct-q4_k_m-00002-of-00002.gguf
                          BASE="https://huggingface.co/Qwen/Qwen2.5-7B-Instruct-GGUF/resolve/main"
                          valid_gguf() { [ -f "$1" ] && [ "$(dd if=$1 bs=1 count=4 2>/dev/null)" = "GGUF" ]; }
                          if valid_gguf "$SHARD1" && valid_gguf "$SHARD2"; then
                            echo "Model shards already present, skipping download."
                          else
                            for SHARD in "$SHARD1" "$SHARD2"; do
                              FILE=$(basename $SHARD)
                              if ! valid_gguf "$SHARD"; then
                                rm -f "$SHARD"
                                echo "Downloading $FILE..."
                                curl -L --fail -o "$SHARD" "$BASE/$FILE" \
                                  && echo "$FILE done." \
                                  || { echo "Failed to download $FILE"; rm -f "$SHARD"; exit 1; }
                              else
                                echo "$FILE already valid, skipping."
                              fi
                            done
                          fi
                  volumeMounts:
                      - name: models
                        mountPath: /models
            containers:
                - name: llama-server
                  image: ghcr.io/ggerganov/llama.cpp:server-cuda-b4719
                  args:
                      - --model
                      - /models/qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf
                      - --host
                      - 0.0.0.0
                      - --port
                      - "8080"
                      - --n-gpu-layers
                      - "99"
                      - --ctx-size
                      - "4096"
                      - --jinja
                  ports:
                      - containerPort: 8080
                  resources:
                      limits:
                          nvidia.com/gpu: "1"
                  volumeMounts:
                      - name: models
                        mountPath: /models
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 15
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 60
                      periodSeconds: 30
            volumes:
                - name: models
                  persistentVolumeClaim:
                      claimName: qwen2-5-7b-models-pvc
